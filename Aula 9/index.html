<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 9</title>
</head>
<body>
    <h1>Formulário</h1>
    <table border="1">
        <thead>
        </thead>
        <tbody>
            <tr>
                <td>
                    Nome:
                </td>
                <td>
                    <form action="mailto:matheussipioni@gmail.com" method="post">
                        <label for="nome_usuario"></label>
                        <Input type="text" name="nome_usuario" id="nome_usuario" maxlength="50" value="" placeholder="Digite seu nome"></Input>
                    </form>
                </td>
            </tr>
            <tr>
                <td>
                    E-mail pessoal:
                </td>
                <td>
                    <form action="mailto:matheussipioni@gmail.com" method="get">
                        <label for="E-mail"></label>
                        <input type="email" name="email_usuario" id="email_usuario" maxlength="50" value="">
                    </form>
                </td>
            </tr>
            <tr>
                <td>
                    E-mail (patter): 
                </td>
                <td>
                    <form action="mailto:matheussipioni@gmail.com" method="get">
                        <label for="E-mail_patter"></label>
                        <input type="E-mail_patter" name="E-mail_patter" id="E-mail_patter" maxlength="50" value="" placeholder="Digite seu email com @">
                    </form>
                </td>
            </tr>
            <tr>
                <td>
                    Senha
                </td>
                <td>
                    <form action="mailto:matheussipioni@gmail.com" method="get">
                        <label for="Senha"></label>
                        <input type="number" name="senha" id="senha" value="">
                    </form>
                </td>
            </tr>
            <tr>
                <td>
                    Idade
                </td>
                <td>
                    <form action="mailto:matheussipioni@gmail.com" method="get">
                        <label for="Idade"></label>
                        <input type="number" name="idade" id="idade" value="">
                    </form>
                </td>
            </tr>
            <Tr>
                <td colspan="2">
                    <p>Deixe seu comentário:</p>
                    <textarea name="comentário" id="comentario" cols="50" rows="10" readonly></textarea>
                </td>
            </Tr>
        </tbody>
        <tfoot></tfoot>
    </table>
</body>
</html>
